<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BUAP — Mapa del Campus</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="preconnect" href="https://api.mapbox.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream:    #F5EDD6;
      --brown:    #3B2A1A;
      --gold:     #C9933A;
      --panel-bg: rgba(245, 237, 214, 0.97);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #2C1F10;
      overflow: hidden;
    }

    #map { position: absolute; inset: 0; }

    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      padding: 16px 20px 12px;
      background: linear-gradient(to bottom, rgba(44,31,16,0.92) 0%, transparent 100%);
      pointer-events: none;
    }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--cream);
      letter-spacing: 0.02em;
    }
    .header-subtitle {
      font-size: 11px;
      color: rgba(245,237,214,0.6);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .filters {
      position: absolute;
      top: 80px; left: 0; right: 0;
      z-index: 20;
      padding: 0 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid rgba(245,237,214,0.25);
      background: rgba(44,31,16,0.75);
      color: rgba(245,237,214,0.85);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.18s ease;
      white-space: nowrap;
      user-select: none;
    }
    .chip:hover { border-color: var(--gold); color: var(--cream); }
    .chip.active { background: var(--gold); border-color: var(--gold); color: var(--brown); }
    .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .controls {
      position: absolute;
      right: 16px; bottom: 220px;
      z-index: 20;
      display: flex; flex-direction: column; gap: 8px;
    }
    .ctrl-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(245,237,214,0.15);
      background: rgba(44,31,16,0.85);
      color: var(--cream);
      font-size: 18px; cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.15s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:hover { background: var(--gold); color: var(--brown); }

    /* ── Detail panel ── */
    .detail-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 30;
      background: var(--panel-bg);
      border-radius: 20px 20px 0 0;
      padding: 0 20px 40px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 -4px 30px rgba(0,0,0,0.35);
    }
    .detail-panel.open { transform: translateY(0); }

    .panel-handle {
      width: 36px; height: 4px;
      background: rgba(59,42,26,0.2);
      border-radius: 2px;
      margin: 12px auto 16px;
    }
    .panel-badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: white; padding: 3px 10px;
      border-radius: 999px; margin-bottom: 8px;
    }
    .panel-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: var(--brown);
      line-height: 1.2; margin-bottom: 6px;
    }
    .panel-desc {
      font-size: 14px; color: rgba(59,42,26,0.65);
      line-height: 1.6; margin-bottom: 16px;
    }
    .panel-close {
      position: absolute; top: 16px; right: 20px;
      width: 30px; height: 30px;
      border-radius: 50%; border: none;
      background: rgba(59,42,26,0.1); color: var(--brown);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Botones de navegación dentro del panel ── */
    .panel-nav-btns {
      display: flex; gap: 8px; margin-bottom: 12px;
    }
    .panel-nav-btn {
      flex: 1; padding: 10px 8px;
      border-radius: 12px; border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 600;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 5px;
    }
    #btn-nav-user { background: #1A73E8; color: white; display: none; }
    #btn-nav-poi  { background: var(--brown); color: var(--cream); }

    .panel-actions { display: flex; gap: 10px; }
    .panel-btn {
      flex: 1; padding: 10px; border-radius: 12px; border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .panel-btn.primary   { background: var(--brown); color: var(--cream); }
    .panel-btn.secondary { background: rgba(59,42,26,0.1); color: var(--brown); }

    /* ── Botón de ubicación ── */
    #btn-location {
      position: absolute;
      right: 16px; bottom: 160px;
      z-index: 20;
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(245,237,214,0.15);
      background: rgba(44,31,16,0.85);
      color: var(--cream);
      font-size: 18px; cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.15s ease;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-location:hover { background: #1A73E8; }

    /* ── Barra de navegación activa ── */
    #nav-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 35;
      background: var(--brown);
      color: var(--cream);
      padding: 16px 20px 36px;
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    #nav-bar.open { transform: translateY(0); }
    #nav-bar-icon { font-size: 28px; }
    #nav-bar-info { flex: 1; }
    #nav-dest { font-family: 'Playfair Display', serif; font-size: 16px; margin-bottom: 2px; }
    #nav-meta { display: flex; gap: 12px; font-size: 12px; opacity: 0.75; }
    #nav-mode-label { font-size: 11px; opacity: 0.5; margin-top: 2px; }
    #nav-bar-close {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: none;
      color: var(--cream); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Modal selector de POI origen ── */
    #poi-selector {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 40;
      background: var(--panel-bg);
      border-radius: 20px 20px 0 0;
      padding: 16px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 -4px 30px rgba(0,0,0,0.25);
    }
    #poi-selector.open { transform: translateY(0); }
    #poi-selector h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px; color: var(--brown); margin-bottom: 14px;
    }
    #poi-selector-close {
      position: absolute; top: 16px; right: 20px;
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: rgba(59,42,26,0.1);
      color: var(--brown); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #poi-selector-list { display: flex; flex-direction: column; gap: 8px; }
    .poi-selector-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: 12px; border: none;
      background: rgba(59,42,26,0.07);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      color: var(--brown); cursor: pointer;
      text-align: left; transition: background 0.15s;
    }
    .poi-selector-item:hover { background: rgba(201,147,58,0.15); }

    /* ── Toast de error ── */
    #nav-error {
      position: absolute;
      bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 50;
      background: #B84040; color: white;
      padding: 10px 18px; border-radius: 999px;
      font-size: 13px; font-weight: 500;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
    }
    #nav-error.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .mapboxgl-ctrl-bottom-left,
    .mapboxgl-ctrl-bottom-right { display: none !important; }
  </style>
  <script type="module" crossorigin src="/assets/index-hFcalRpT.js"></script>
</head>
<body>
  <div id="map"></div>

  <div class="header">
    <div>
      <div class="header-title">BUAP</div>
      <div class="header-subtitle">Ciudad Universitaria</div>
    </div>
  </div>

  <div class="filters">
    <div class="chip active" data-cat="all"><span class="chip-dot" style="background:var(--gold)"></span>Todo</div>
    <div class="chip" data-cat="aulas"><span class="chip-dot" style="background:#2E6B9E"></span>Aulas</div>
    <div class="chip" data-cat="biblioteca"><span class="chip-dot" style="background:#6B4E8A"></span>Biblioteca</div>
    <div class="chip" data-cat="comida"><span class="chip-dot" style="background:#D4713A"></span>Comida</div>
    <div class="chip" data-cat="deportivo"><span class="chip-dot" style="background:#4A7C59"></span>Deportivo</div>
    <div class="chip" data-cat="servicios"><span class="chip-dot" style="background:#B84040"></span>Servicios</div>
    <div class="chip" data-cat="admin"><span class="chip-dot" style="background:#C9933A"></span>Admin</div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="btn-campus">⌂</button>
    <button class="ctrl-btn" id="btn-top">◎</button>
    <button class="ctrl-btn" id="btn-rotate">↻</button>
  </div>

  <!-- Botón de ubicación -->
  <button id="btn-location" title="Mi ubicación">📍</button>

  <!-- Detail panel — con botones de nav DENTRO -->
  <div class="detail-panel" id="detail-panel">
    <div class="panel-handle"></div>
    <button class="panel-close" id="panel-close">×</button>
    <div class="panel-badge" id="panel-badge">Lugar</div>
    <div class="panel-name"  id="panel-name">Nombre</div>
    <div class="panel-desc"  id="panel-desc">Descripción</div>
    <!-- ↓ Botones de navegación AQUÍ, dentro del panel -->
    <div class="panel-nav-btns">
      <button class="panel-nav-btn" id="btn-nav-user">📍 Desde aquí</button>
      <button class="panel-nav-btn" id="btn-nav-poi">🗺️ Entre puntos</button>
    </div>
    <div class="panel-actions">
      <button class="panel-btn primary">Cómo llegar</button>
      <button class="panel-btn secondary">Compartir</button>
    </div>
  </div>

  <!-- Barra de navegación activa -->
  <div id="nav-bar">
    <div id="nav-bar-icon">🧭</div>
    <div id="nav-bar-info">
      <div id="nav-dest">Destino</div>
      <div id="nav-meta">
        <span id="nav-duration"></span>
        <span id="nav-distance"></span>
      </div>
      <div id="nav-mode-label"></div>
    </div>
    <button id="nav-bar-close">✕</button>
  </div>

  <!-- Modal selector de POI origen -->
  <div id="poi-selector">
    <button id="poi-selector-close">×</button>
    <h3>¿Desde dónde sales?</h3>
    <div id="poi-selector-list"></div>
  </div>

  <!-- Toast de errores -->
  <div id="nav-error"></div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
</body>
</html>x
